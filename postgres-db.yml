apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-db
spec:
  selector:
    matchLabels:
      app: sentinel-db
  template:
    metadata:
      labels:
        app: sentinel-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_PASSWORD
          value: "sentinel_pass"
        - name: POSTGRES_DB
          value: "sentinel_metrics"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {} # Local node storage - no cloud waiting required
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-db
spec:
  selector:
    app: sentinel-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
