apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
data:
  prometheus.yml: |-
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'sentinel-db'
        static_configs:
          - targets: ['sentinel-db:9187']
      - job_name: 'sentinel-active'
        static_configs:
          - targets: ['sentinel-active:9090']
