apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-core-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinel-core
  template:
    metadata:
      labels:
        app: sentinel-core
    spec:
      imagePullSecrets:
      - name: ecr-pull-secret
      containers:
      - name: sentinel-core
        image: 194636598053.dkr.ecr.af-south-1.amazonaws.com/sentinel-core:v5.0.0-enterprise
        env:
        - name: SLACK_URL
          valueFrom:
            secretKeyRef:
              name: sentinel-secrets
              key: SLACK_URL
        - name: CLOUD_NAME
          valueFrom:
            configMapKeyRef:
              name: sentinel-config
              key: CLOUD_NAME
        - name: DB_HOST
          value: "sentinel-db"
        ports:
        - containerPort: 5000
      - name: node-exporter
        image: prom/node-exporter:v1.7.0
        ports:
        - containerPort: 9100
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin" # Amazon will change this during handover
