apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  selector:
    app: sentinel-core
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9100 
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-loadbalancer
spec:
  type: LoadBalancer
  selector:
    app: sentinel-core
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
