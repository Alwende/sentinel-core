apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-core-deployment
spec:
  replicas: 1 # This is where we will eventually type 10000
  selector:
    matchLabels:
      app: sentinel-core
  template:
    metadata:
      labels:
        app: sentinel-core
    spec:
      containers:
      - name: sentinel-container
        image: us-central1-docker.pkg.dev/charming-scarab-474407-i8/sentinel-core-enterprise/sentinel-core:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-service
spec:
  type: LoadBalancer # This gives us a REAL public IP address for the world to see
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: sentinel-core
