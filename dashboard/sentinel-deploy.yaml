apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-hud-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinel-hud
  template:
    metadata:
      labels:
        app: sentinel-hud
    spec:
      containers:
      - name: sentinel-hud
        image: gcr.io/charming-scarab-474407-i8/sentinel-hud:v5.5.0
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-hud-service
spec:
  type: LoadBalancer
  selector:
    app: sentinel-hud
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
