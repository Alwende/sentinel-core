<!DOCTYPE html>
<html>
<head>
    <title>Sentinel-Core Command Center</title>

        body { font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; }
        .status-box { border: 2px solid #00ff00; display: inline-block; padding: 20px; margin-top: 50px; }
        .success { color: #00ff00; font-weight: bold; }

</head>
<body>

    </div>
</body>
</html>
