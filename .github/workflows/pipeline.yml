name: Sentinel-Core CI

on:
    push:
          branches: [ main ]
              pull_request:
                    branches: [ main ]

                    jobs:
                        audit-test:
                              runs-on: ubuntu-latest

                                    steps:
                                          - name: Checkout Code
                                                  uses: actions/checkout@v4

                                                        - name: Set Execution Permissions
                                                                run: chmod +x bin/sentinel_audit.sh

                                                                      - name: Run Sentinel-Core Audit
                                                                              run: ./bin/sentinel_audit.sh

                                                                                    - name: Verify Log Creation
                                                                                            run: |
                                                                                                      if [ -f system_audit_*.log ]; then
                                                                                                                echo "SUCCESS: Audit Log Generated."
                                                                                                                          else
                                                                                                                                    echo "FAILURE: No Log Found."
                                                                                                                                                exit 1
                                                                                                                                                        fi
