name: Sentinel-Core CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Execution Permissions
      run: chmod +x bin/sentinel_audit.sh

    - name: Run Sentinel-Core Audit
      run: |
        cd bin
        ./sentinel_audit.sh
        cd ..

    - name: Verify Log Creation
      run: |
        if ls bin/system_audit_*.log 1> /dev/null 2>&1; then
          echo "SUCCESS: Audit Log Generated in bin/ folder."
        elif ls system_audit_*.log 1> /dev/null 2>&1; then
          echo "SUCCESS: Audit Log Generated in root folder."
        else
          echo "FAILURE: No Log Found."
          exit 1
        fi
